    <line x1="200" y1="42" x2="200" y2="30"/><line x1="200" y1="178" x2="200" y2="190"/>
    <line x1="132" y1="110" x2="120" y2="110"/><line x1="268" y1="110" x2="280" y2="110"/>
    <line x1="152" y1="62" x2="144" y2="54"/><line x1="248" y1="158" x2="256" y2="166"/>
    <line x1="248" y1="62" x2="256" y2="54"/><line x1="152" y1="158" x2="144" y2="166"/>
  </g>
  <!-- Texto -->
  <text x="200" y="205" text-anchor="middle" font-family="monospace" font-size="11" fill="#ff6600" letter-spacing="4">VERANO</text>
