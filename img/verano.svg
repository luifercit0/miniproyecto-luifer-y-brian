<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#050505"/>
  <line x1="0" y1="0" x2="400" y2="0" stroke="#ff2233" stroke-width="2"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#ff2233" stroke-width="2"/>
  <!-- Grid background -->
  <g stroke="rgba(255,34,51,0.06)" stroke-width="1">
    <line x1="0" y1="44" x2="400" y2="44"/><line x1="0" y1="88" x2="400" y2="88"/>
    <line x1="0" y1="132" x2="400" y2="132"/><line x1="0" y1="176" x2="400" y2="176"/>
    <line x1="80" y1="0" x2="80" y2="220"/><line x1="160" y1="0" x2="160" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/><line x1="320" y1="0" x2="320" y2="220"/>
  </g>
  <!-- Sol con rayos -->
  <circle cx="200" cy="110" r="55" fill="none" stroke="#ff6600" stroke-width="3" opacity="0.4"/>
