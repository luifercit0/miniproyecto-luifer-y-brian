<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <rect width="400" height="220" fill="#050505"/>
  <line x1="0" y1="0" x2="400" y2="0" stroke="#ff2233" stroke-width="2"/>
  <line x1="0" y1="220" x2="400" y2="220" stroke="#ff2233" stroke-width="2"/>
  <g stroke="rgba(255,34,51,0.06)" stroke-width="1">
    <line x1="0" y1="44" x2="400" y2="44"/><line x1="0" y1="88" x2="400" y2="88"/>
    <line x1="0" y1="132" x2="400" y2="132"/><line x1="0" y1="176" x2="400" y2="176"/>
    <line x1="80" y1="0" x2="80" y2="220"/><line x1="160" y1="0" x2="160" y2="220"/>
    <line x1="240" y1="0" x2="240" y2="220"/><line x1="320" y1="0" x2="320" y2="220"/>
  </g>
  <!-- Árbol tronco -->
  <rect x="188" y="130" width="24" height="60" rx="4" fill="#5a2d00" opacity="0.9"/>
  <!-- Ramas -->
  <line x1="200" y1="130" x2="150" y2="90" stroke="#5a2d00" stroke-width="6"/>
  <line x1="200" y1="130" x2="250" y2="90" stroke="#5a2d00" stroke-width="6"/>
  <line x1="200" y1="115" x2="170" y2="80" stroke="#5a2d00" stroke-width="4"/>
  <line x1="200" y1="115" x2="230" y2="80" stroke="#5a2d00" stroke-width="4"/>
  <!-- Hojas -->
  <circle cx="160" cy="80" r="28" fill="#cc4400" opacity="0.85"/>
  <circle cx="240" cy="80" r="28" fill="#dd5500" opacity="0.85"/>
  <circle cx="200" cy="60" r="32" fill="#bb3300" opacity="0.85"/>
  <circle cx="130" cy="95" r="20" fill="#ee6600" opacity="0.7"/>
  <circle cx="270" cy="95" r="20" fill="#aa2200" opacity="0.7"/>
  <!-- Hojas cayendo -->
  <ellipse cx="120" cy="150" rx="8" ry="5" fill="#cc4400" opacity="0.6" transform="rotate(-30,120,150)"/>
  <ellipse cx="300" cy="140" rx="7" ry="4" fill="#dd5500" opacity="0.6" transform="rotate(20,300,140)"/>
  <ellipse cx="80" cy="170" rx="6" ry="4" fill="#ee6600" opacity="0.5" transform="rotate(45,80,170)"/>
  <text x="200" y="205" text-anchor="middle" font-family="monospace" font-size="11" fill="#cc4400" letter-spacing="4">OTONO</text>
</svg>
